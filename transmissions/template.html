<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>{{TITLE}} — Arcaddia Transmission Archive</title>

  <link rel="stylesheet" href="../style.css">
</head>

<body data-page="entry">

<main class="container">

  <!-- TOP NAV -->
  <nav class="topbar">
    <a href="../index.html" class="top-link">HOME</a>
    <a href="../transmissions.html" class="top-link">TRANSMISSIONS</a>
    <a href="../signal.html" class="top-link">SIGNAL</a>
  </nav>

  <!-- HEADER -->
  <header>

    <p class="status">
      {{CYCLE}}
    </p>

    <h1>
      {{TITLE}}
    </h1>

    <p class="intro">
      {{SUBTITLE}}
    </p>

  </header>

  <!-- SIGNAL / ARCHIVIST NOTE -->
  <section class="block">

    <p class="label">SIGNAL</p>

    <div class="archivist-note">

      <p>
        {{SIGNAL_TEXT}}
      </p>

    </div>

  </section>

  <!-- AUDIO -->
  <section class="block">

    <p class="label">TRANSMISSION PLAYBACK</p>

    <audio controls id="audio-player">
      <source src="../audio/{{AUDIO_FILE}}" type="audio/mpeg">
    </audio>

    <p class="system-message" id="playback-status"></p>

  </section>

  <!-- TRANSMISSION BODY -->
  <section class="block">

    <p class="label">TRANSMISSION LOG</p>

    <div class="transmission-body">

      {{TRANSMISSION_BODY}}

    </div>

  </section>

  <!-- DIVIDER -->
  <div class="section-divider"></div>

  <!-- SYSTEM STATUS -->
  <section class="block">

    <p class="label">SYSTEM STATUS</p>

    <ul class="status-list">

      <li>{{STATUS_1}}</li>
      <li>{{STATUS_2}}</li>
      <li>{{STATUS_3}}</li>

    </ul>

  </section>

  <!-- FOOTER -->
  <footer>
    <p> reception contrubuites to continuity retention.   <span class="cursor">_</span></p>
  </footer>

</main>

<!-- JS -->
<script src="../archive.js"></script>

</body>
</html>
